openapi: 3.1.0
info:
  title: Meditherapy Skin Coach Plugin API
  description: |
    메디테라피 스킨 코치 API. 피부고민 기반 루틴 추천, 익명 체크인 저장, Convex 기반 사용 데이터 요약을 제공합니다.
    개인정보는 저장하지 않고 구조화된 익명 이벤트만 저장합니다.
  version: 1.1.0
servers:
  - url: https://meditherapy-skin-coach-dashboard.vercel.app
paths:
  /api/recommend-routine:
    post:
      operationId: recommendRoutine
      summary: 피부고민 기반 메디테라피 루틴 추천
      description: 피부타입, 고민, 민감도, 목표 속도를 받아 CrabAgent V2 제품 온톨로지 기반으로 제품 패밀리를 검색/reranking하고 루틴과 체크인 일정을 추천합니다. 응답에는 '안녕하세요, 메디테라피입니다.'로 시작하는 modelAnswerMarkdown과 추천 제품별 실제 링크가 포함됩니다. consentForAnalytics가 true일 때만 익명 이벤트를 저장합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skinType:
                  type: string
                  example: 복합성
                concerns:
                  type: array
                  items:
                    type: string
                  example: [피부결, 모공, 화장밀림]
                sensitivity:
                  type: string
                  enum: [low, medium, high, 민감, 보통, 낮음]
                  example: medium
                budget:
                  type: string
                  example: 5만원 이하
                goalSpeed:
                  type: string
                  example: 7일
                locale:
                  type: string
                  example: ko-KR
                consentForAnalytics:
                  type: boolean
                  description: 익명 사용 이벤트 저장 동의 여부
                  default: false
      responses:
        "200":
          description: 추천 루틴
          content:
            application/json:
              schema:
                type: object
                properties:
                  pluginName:
                    type: string
                  brandGreeting:
                    type: string
                    description: 답변 시작 인사. 모델은 답변 첫 문장에 이 값을 사용합니다.
                  answerStyleGuide:
                    type: array
                    items:
                      type: string
                  modelAnswerMarkdown:
                    type: string
                    description: 메디테라피 인사와 제품별 클릭 링크를 포함한 권장 답변 초안
                  routineId:
                    type: string
                  summary:
                    type: string
                  recommendedProducts:
                    type: array
                    items:
                      type: string
                  productLinks:
                    type: array
                    description: 추천 제품별 실제 상세페이지 링크. 답변 시 제품마다 하나씩 모두 표시합니다.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                        trackingUrl:
                          type: string
                          description: 클릭 시 익명 product_link_clicked 이벤트를 저장한 뒤 실제 제품 URL로 이동하는 추적 링크
                  recommendedProductDetails:
                    type: array
                    description: CrabAgent V2 온톨로지 기반 추천 근거와 점수
                    items:
                      type: object
                      properties:
                        familyKey:
                          type: string
                        name:
                          type: string
                        score:
                          type: number
                        confidence:
                          type: number
                        concerns:
                          type: array
                          items:
                            type: string
                        ingredients:
                          type: array
                          items:
                            type: string
                        useCases:
                          type: array
                          items:
                            type: string
                        matchedSignals:
                          type: array
                          items:
                            type: string
                        exampleUrl:
                          type: string
                  gptTodoPlan:
                    type: array
                    description: ChatGPT의 native Tasks/할일 도구가 사용 가능한 환경에서 그대로 할일로 만들 수 있는 구조화 일정
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        dueInDays:
                          type: number
                        checklist:
                          type: array
                          items:
                            type: string
                  todoIntegrationStatus:
                    type: string
                    description: ChatGPT native Tasks 도구 사용 가능 시 할일 생성 준비 상태
                  morning:
                    type: array
                    items:
                      type: string
                  night:
                    type: array
                    items:
                      type: string
                  timeline:
                    type: array
                    items:
                      type: object
                  safetyRules:
                    type: array
                    items:
                      type: string
                  ontology:
                    type: object
                    properties:
                      version:
                        type: string
                      packageId:
                        type: string
                      source:
                        type: string
                      recordsTotal:
                        type: number
                      familiesTotal:
                        type: number
                      qaScore:
                        type: number
                      releaseReady:
                        type: boolean
                      rankingMode:
                        type: string
                  analyticsSaved:
                    type: boolean
  /api/record-event:
    post:
      operationId: recordSkinCoachEvent
      summary: 익명 루틴/체크인 이벤트 저장
      description: 이름, 전화번호, 이메일, 주소, 주문번호, 원문 대화, 사진 원본을 받지 않고 익명 구조화 이벤트만 Convex DB에 저장합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  type: string
                  enum: [routine_recommendation, task_schedule_created, checkin, routine_adjustment, product_feedback, ontology_gap]
                userSeed:
                  type: string
                  description: 익명 해시 생성을 위한 비식별 seed. 원문 개인정보 사용 금지.
                skinType:
                  type: string
                concerns:
                  type: array
                  items:
                    type: string
                sensitivity:
                  type: string
                routineId:
                  type: string
                productIds:
                  type: array
                  items:
                    type: string
                checkinDay:
                  type: number
                drynessScore:
                  type: number
                irritationScore:
                  type: number
                satisfactionScore:
                  type: number
                action:
                  type: string
                locale:
                  type: string
                ontologyGapFields:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: 저장 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  saved:
                    type: object
  /api/skin-coach-summary:
    get:
      operationId: getSkinCoachSummary
      summary: 익명 사용 데이터 대시보드 요약 조회
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [all, 7d, 24h]
      responses:
        "200":
          description: Convex 기반 집계 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalEvents:
                    type: number
                  funnel:
                    type: object
                  avgSatisfaction:
                    type: number
                  topConcerns:
                    type: array
                    items:
                      type: object
                  ontologyGaps:
                    type: object
  /api/product-click:
    get:
      operationId: trackProductClick
      summary: 추천 제품 링크 클릭을 product_feedback/action=product_link_clicked로 익명 기록 후 실제 제품 페이지로 이동
      parameters:
        - name: productId
          in: query
          schema: { type: string }
        - name: routineId
          in: query
          schema: { type: string }
        - name: target
          in: query
          schema: { type: string }
      responses:
        "302":
          description: 실제 메디테라피 제품 페이지로 리다이렉트
  /api/export-analytics:
    get:
      operationId: exportOwnerAnalytics
      summary: 개인정보 없는 집계 분석 데이터 내보내기
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [all, 7d, 24h]
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
      responses:
        "200":
          description: 원문/사용자해시 없는 집계 데이터
