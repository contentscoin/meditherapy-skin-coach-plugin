<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>메디테라피 스킨 코치 개인정보 처리 원칙</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;max-width:840px;margin:40px auto;padding:0 20px;line-height:1.7;color:#23151a}h1{color:#8b3a62}code{background:#fff3f6;padding:2px 6px;border-radius:8px}</style></head><body><h1>메디테라피 스킨 코치 개인정보 처리 원칙</h1><p>이 데모 플러그인은 개인정보를 저장하지 않고, 루틴 개선을 위한 익명 구조화 이벤트만 저장합니다.</p><h2>저장 가능</h2><ul><li>피부고민, 피부타입, 민감도</li><li>루틴 ID, 제품 ID</li><li>체크인 점수, 루틴 변경 사유</li><li>국가/언어 범주</li></ul><h2>저장 금지</h2><ul><li>이름, 전화번호, 이메일, 주소</li><li>주문번호, 결제정보</li><li>사진 원본</li><li>원문 대화 전체</li></ul><p>분석 이벤트는 <code>anon_...</code> 형태의 비식별 해시로 저장됩니다.</p></body></html>
