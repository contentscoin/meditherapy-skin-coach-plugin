<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff7f3; color: #2f211d; }
      .wrap { padding: 20px; }
      .card { background: white; border: 1px solid #f0d6cb; border-radius: 18px; padding: 18px; box-shadow: 0 12px 32px rgba(148,80,52,.12); }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { line-height: 1.55; }
      .pill { display:inline-block; background:#fff0e9; border-radius:999px; padding:5px 10px; margin:3px; font-size:13px; }
      small { color:#7a6259; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>메디테라피 스킨 코치</h1>
        <p>피부고민을 입력하면 제품 온톨로지 V2 기반으로 루틴과 GPT 할일 계획을 추천합니다.</p>
        <span class="pill">제품 223개</span>
        <span class="pill">제품 패밀리 86개</span>
        <span class="pill">QA 96</span>
        <p><small>개인정보 없이 익명 구조화 이벤트만 저장합니다.</small></p>
      </div>
    </div>
  </body>
</html>
